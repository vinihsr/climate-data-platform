version: '3.8'
services:
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    # MUDANÇA 1: Adicionado healthcheck para garantir que o banco está pronto 
    # antes de qualquer serviço do Airflow tentar se conectar.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    build: .
    image: apache/airflow:2.7.1-python3.9
    # MUDANÇA 2: Usando entrypoint bash para garantir que os comandos de DB rodem em sequência.
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade
        airflow users create --username airflow --password airflow --firstname Vinicius --lastname Silva --role Admin --email admin@example.com
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      
    # MUDANÇA 3: Só inicia o init quando o postgres passar no healthcheck.
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    build: .
    image: apache/airflow:2.7.1-python3.9
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/scripts:/opt/airflow/scripts
      - ./requirements.txt:/requirements.txt
      - ./airflow/logs:/opt/airflow/logs  # <-- ADICIONE ESTA LINHA
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # MUDANÇA 5: Corrigido de CORE para DATABASE (padrão Airflow 2.3+).
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False

  airflow-scheduler:
    build: .
    image: apache/airflow:2.7.1-python3.9
    command: scheduler
    # MUDANÇA 6: O Scheduler também espera o init terminar.
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/scripts:/opt/airflow/scripts
      - ./airflow/logs:/opt/airflow/logs  # <-- ADICIONE ESTA LINHA
    env_file:
      - .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor